  <path d="M50,38 C60,38 68,43 68,52 L68,62" fill="none" stroke="#ffd54f" stroke-width="3" stroke-linecap="round" />
  <rect x="65" y="62" width="6" height="10" rx="1.5" fill="#ffd54f" />
</svg>
