<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Rounded warm background card -->
  <rect width="100" height="100" rx="24" fill="#ffd54f" />
  
  <!-- Stylized graduation mortarboard representing learning -->
  <polygon points="50,22 82,38 50,54 18,38" fill="#0d47a1" />
  <polygon points="26,38 50,26 74,38 50,50" fill="#00b0ff" opacity="0.8" />
  
  <!-- Cap base -->
  <path d="M36,46 L36,54 C36,60 64,60 64,54 L64,46" fill="#0d47a1" />
  
  <!-- Tassel -->
